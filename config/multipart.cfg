#Multipart API config file

debug_asm=false

#Set to true to enable the saws used to craft microblocks
enableSaws=false

#Set to true to register the default microblocks, including microblocks of most vanilla blocks. Uncraftable without saws enabled
registerDefaultContent=false

#Set to true to use mc style icons for the saw instead of the 3D model
useSawIcons=true

sawDiamond
{
	durability=2048
}

sawIron
{
	durability=1024
}

sawStone
{
	durability=512
}
